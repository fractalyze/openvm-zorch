#
# Receives an `frx-update` repository_dispatch from the jax repo's
# notify-downstream workflow and opens a pin-bump PR. openvm-zorch must be in
# that dispatcher's consumer list for events to arrive.
#
# The event type and `client_payload.frx_version` are the *sender's* wire
# contract and must match what notify-downstream emits. Drifting from it kills
# the bot silently: a repository_dispatch that matches no workflow raises
# nothing, it just stops bumping.
#
# `upstream_repo: jax` is NOT a half-finished rename. It is the real upstream
# repo name, and pip-bump interpolates it into a
# github.com/fractalyze/<repo>/commit link — frx is only how that repo's wheels
# are published. fractalyze/frx exists but is a PyPI-name placeholder, so
# pointing there would link a commit that does not exist in it.

name: FRX Update

on:
  repository_dispatch:
    types: [frx-update]

concurrency:
  group: frx-update
  cancel-in-progress: true

jobs:
  bump:
    runs-on: [self-hosted, cpu]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUMPER_GH_PAT }}

      - name: Bump frx/frxlib/frx-cuda12 plugins
        uses: fractalyze/github-actions/pip-bump@main
        with:
          upstream_repo: jax
          version: ${{ github.event.client_payload.frx_version }}
          upstream_commit: ${{ github.event.client_payload.commit }}
          packages: frx frxlib frx-cuda12-pjrt frx-cuda12-plugin
          github_token: ${{ secrets.BUMPER_GH_PAT }}
